<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zegar wskazówkowy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #e8eefc;
      overflow: hidden;
      position: relative;
    }

    /* Classroom photo background, dimmed & slightly blurred so the clock pops */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        url("classroom-bg.jpg") center / cover no-repeat;
      filter: brightness(0.45) saturate(0.85) blur(3px);
      transform: scale(1.06); /* hide blur edges */
    }
    /* Vignette + central spotlight to focus attention on the clock */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 50% 42%,
          rgba(10,15,30,0)   0%,
          rgba(10,15,30,0.35) 45%,
          rgba(6,9,20,0.8)   100%);
    }

    .clock {
      position: relative;
      width: min(64vmin, 448px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 35%, #fdfdfd 0%, #e9edf5 60%, #cfd6e4 100%);
      box-shadow:
        0 0 0 14px #c2a14e,
        0 0 0 22px #9c7d33,
        0 30px 70px rgba(0,0,0,0.8),
        inset 0 0 40px rgba(0,0,0,0.12);
    }

    /* Hour & minute tick marks */
    .tick {
      position: absolute;
      left: 50%;
      top: 0;
      width: 2px;
      height: 50%;
      transform-origin: bottom center;
    }
    .tick::before {
      content: "";
      position: absolute;
      top: 3%;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 4%;
      background: #6b7280;
      border-radius: 2px;
    }
    .tick.hour::before {
      width: 5px;
      height: 7%;
      background: #1f2937;
    }

    /* Numbers */
    .number {
      position: absolute;
      left: 50%;
      top: 50%;
      font-size: clamp(1.3rem, 5vmin, 2.4rem);
      font-weight: 700;
      color: #1f2937;
      transform: translate(-50%, -50%);
    }

    /* Hands */
    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 8px;
      z-index: 5;
    }
    .hand.hour {
      width: 12px;
      height: 26%;
      margin-left: -6px;
      background: linear-gradient(#111827, #374151);
    }
    .hand.minute {
      width: 8px;
      height: 38%;
      margin-left: -4px;
      background: linear-gradient(#1f2937, #4b5563);
    }
    .hand.second {
      width: 3px;
      height: 44%;
      margin-left: -1.5px;
      background: #dc2626;
      z-index: 6;
    }
    .hand.second::after {
      content: "";
      position: absolute;
      bottom: -16%;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 16%;
      background: #dc2626;
      border-radius: 4px;
    }

    .cap {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22px;
      height: 22px;
      background: radial-gradient(circle, #dc2626 40%, #7f1d1d 100%);
      border: 3px solid #1f2937;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 7;
    }

    .digital {
      font-size: clamp(1.4rem, 6vmin, 2.6rem);
      font-weight: 600;
      letter-spacing: 0.15em;
      font-variant-numeric: tabular-nums;
      color: #aebbd6;
      text-shadow: 0 0 18px rgba(120,160,255,0.4);
    }

    .label {
      display: block;
      width: min(92vw, 720px);
      height: auto;
    }

    /* Tabliczka wisząca z boku */
    .plaque {
      position: fixed;
      top: 50%;
      right: clamp(12px, 5vw, 80px);
      transform: translateY(-50%) rotate(-5deg);
      width: clamp(150px, 22vw, 260px);
      padding: 1.4rem 1rem;
      text-align: center;
      background: linear-gradient(160deg, #1e6f3f 0%, #14532d 100%);
      border: 6px solid #b58a3c;
      border-radius: 14px;
      box-shadow:
        0 18px 40px rgba(0,0,0,0.6),
        inset 0 0 24px rgba(0,0,0,0.4);
      z-index: 10;
    }
    /* Sznurek / mocowanie tabliczki */
    .plaque::before {
      content: "";
      position: absolute;
      top: -54px;
      left: 50%;
      width: 4px;
      height: 54px;
      background: #b58a3c;
      transform: translateX(-50%);
    }
    .plaque .hole {
      position: absolute;
      top: 10px;
      left: 50%;
      width: 14px;
      height: 14px;
      background: #0a0f1e;
      border: 2px solid #b58a3c;
      border-radius: 50%;
      transform: translateX(-50%);
    }
    .plaque .text {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 800;
      line-height: 1.15;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
      margin-top: 0.6rem;
    }

    @media (max-width: 640px) {
      .plaque {
        position: static;
        transform: rotate(-3deg);
        margin-top: 1rem;
      }
      .plaque::before { display: none; }
    }
  </style>
</head>
<body>
  <!-- Napis SVG: Klasa 4C -->
  <svg class="label" viewBox="0 0 720 130" role="img" aria-label="Klasa 4C">
    <defs>
      <linearGradient id="gradKlasa" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="#ff6b6b"/>
        <stop offset="100%" stop-color="#c1121f"/>
      </linearGradient>
    </defs>
    <text x="360" y="92" text-anchor="middle"
          font-family="'Segoe UI', system-ui, sans-serif"
          font-size="96" font-weight="800" letter-spacing="2"
          fill="url(#gradKlasa)"
          stroke="#5a0a10" stroke-width="3"
          paint-order="stroke"
          style="filter: drop-shadow(0 4px 10px rgba(0,0,0,0.7));">Klasa 4C</text>
  </svg>

  <div class="clock" id="clock">
    <div class="hand hour"   id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
    <div class="cap"></div>
  </div>
  <div class="digital" id="digital">--:--:--</div>

  <!-- Tabliczka z boku: Dzień Dziecka -->
  <div class="plaque">
    <span class="hole"></span>
    <div class="text">Dzień<br>Dziecka</div>
  </div>

  <script>
    const clock = document.getElementById("clock");

    // Build 60 tick marks (every 5th is an "hour" tick)
    for (let i = 0; i < 60; i++) {
      const tick = document.createElement("div");
      tick.className = "tick" + (i % 5 === 0 ? " hour" : "");
      tick.style.transform = `rotate(${i * 6}deg)`;
      clock.appendChild(tick);
    }

    // Build numbers 1..12 around the dial
    const radius = 41; // % from center
    for (let n = 1; n <= 12; n++) {
      const angle = (n * 30 - 90) * Math.PI / 180;
      const el = document.createElement("div");
      el.className = "number";
      el.textContent = n;
      el.style.left = `${50 + radius * Math.cos(angle)}%`;
      el.style.top  = `${50 + radius * Math.sin(angle)}%`;
      clock.appendChild(el);
    }

    const hourHand = document.getElementById("hour");
    const minuteHand = document.getElementById("minute");
    const secondHand = document.getElementById("second");
    const digital = document.getElementById("digital");

    function tick() {
      const now = new Date();
      const ms = now.getMilliseconds();
      const s = now.getSeconds() + ms / 1000;
      const m = now.getMinutes() + s / 60;
      const h = (now.getHours() % 12) + m / 60;

      hourHand.style.transform   = `rotate(${h * 30}deg)`;
      minuteHand.style.transform = `rotate(${m * 6}deg)`;
      secondHand.style.transform = `rotate(${s * 6}deg)`;

      const pad = (x) => String(x).padStart(2, "0");
      digital.textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
